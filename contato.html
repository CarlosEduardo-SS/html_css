<!DOCTYPE html>
<html>
    <head>
        <title>Formulário - Entra21</title>
    </head>
    <body>
        <form action="enviar.php" method="get">
            <div>
                <label for="nome_completo">Nome Completo:</label>
                <input type="text" name="nome_completo" id="nome_completo" required maxlength="35">
            </div>
            <div>
                <label for="email_usuario">E-mail:</label>
                <input type="email" name="email_usuario" id="email_usuario" required>
            </div>
            <div>
                <label for="idade">Idade:</label>
                <input type="number" name="idade" id="idade" required value="18">
            </div>
            <hr>
            <div>
                <label for="cidade">Cidade:</label>
                <select name="cidade" id="cidade">
                    <option value="1" selected>Balneário Camboriú</option>
                    <option value="2">Itajaí</option>
                    <option value="3">Itapema</option>
                    <option value="4">Camboriú</option>
                    <option value="5">Blumenau</option>
                </select>
            </div>
            <div>
                <label for="mensagem">Mensagem:</label>
                <textarea name="mensagem" id="mensagem" rows="5" maxlength="100"></textarea>
            </div>
            <div>
                <div>
                    <label for="label_sexo">Sexo:</label>
                </div>
                <input type="radio" name="sexo" id="sexo_m" value="m" checked>
                <label for="sexo_m">Masculino</label>
            </div>
            <div>
                <input type="radio" name="sexo" id="sexo_f" value="f">
                <label for="sexo_f">Feminino</label>
            </div>
            <div>
                <input type="radio" name="sexo" id="sexo_o" value="o">
                <label for="sexo_o">Outro</label>
            </div>
            <div>
                <button type="submit">Enviar dados</button>
            </div>
        </form>
    </body>
</html>
